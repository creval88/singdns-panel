<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{{.Title}}</title><link rel="stylesheet" href="/static/app.css"></head><body><div class="layout">{{template "sidebar" .}}<main class="content">{{template "page_header" .}}<div class="actions"><button onclick="refreshAudit()">刷新</button></div><section class="card"><div id="audit-list" class="audit-list">{{range .Items}}<div class="audit-item"><div><b>{{.Action}}</b></div>{{if .Time}}<div class="muted">{{.Time}}</div>{{end}}{{if .Actor}}<div class="muted">{{.Actor}}</div>{{end}}<pre>{{.Result}}</pre></div>{{else}}<div class="muted">暂无日志</div>{{end}}</div></section><script src="/static/app.js"></script><script>async function refreshAudit(){const r=await fetch('/api/audit');const j=await r.json();const box=document.getElementById('audit-list');box.innerHTML=(j.items||[]).map(x=>`<div class="audit-item"><div><b>${x.action||''}</b></div>${x.time?`<div class="muted">${x.time}</div>`:''}${x.actor?`<div class="muted">${x.actor}</div>`:''}<pre>${x.result||''}</pre></div>`).join('')||'<div class="muted">暂无日志</div>';}setInterval(refreshAudit,5000)</script></main></div></body></html>
